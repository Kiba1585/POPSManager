# ──────────────────────────────────────────────────────────────
# POPSManager — Certificate Installer Release Workflow
# ──────────────────────────────────────────────────────────────
# Triggers:
#   • Push tag:  cert-installer-v*  (e.g. cert-installer-v1.0.0)
#   • Manual:    workflow_dispatch with version input
#
# Pipeline:
#   1. Validate   → Lint scripts, verify structure & certificate
#   2. Package    → Create ZIP with clean structure
#   3. Release    → Publish GitHub Release with ZIP asset
# ──────────────────────────────────────────────────────────────

name: "📦 Release Certificate Installer"

on:
  push:
    tags:
      - "cert-installer-v*"

  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release?"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run — package only, skip release"
        required: false
        type: boolean
        default: false

# ──────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────
permissions:
  contents: write          # Create releases & upload assets

# ──────────────────────────────────────────────────────────────
# Environment Variables
# ──────────────────────────────────────────────────────────────
env:
  PACKAGE_NAME: "POPSManager.CertificateInstaller"
  PACKAGE_DIR: "POPSManager-Certificate-Installer"
  ARTIFACT_NAME: "certificate-installer-package"

# ──────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════
  # Job 1: Validate
  # ════════════════════════════════════════════════════════════
  validate:
    name: "🔍 Validate Package"
    runs-on: windows-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📂 Verify package structure"
        shell: pwsh
        run: |
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "  Validating package structure"         -ForegroundColor Cyan
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan

          $basePath   = "${{ env.PACKAGE_DIR }}"
          $hasErrors  = $false

          # Required files
          $requiredFiles = @(
            "Installer-Certificate.ps1",
            "Uninstall-Certificate.ps1",
            "README.md",
            "CHANGELOG.md",
            "LICENSE",
            ".gitignore"
          )

          foreach ($file in $requiredFiles) {
            $filePath = Join-Path $basePath $file
            if (Test-Path $filePath) {
              Write-Host "  [✓] $file" -ForegroundColor Green
            }
            else {
              Write-Host "  [✗] $file — MISSING" -ForegroundColor Red
              $hasErrors = $true
            }
          }

          # Required directories
          $certDir = Join-Path $basePath "certificates"
          if (Test-Path $certDir) {
            Write-Host "  [✓] certificates/" -ForegroundColor Green
          }
          else {
            Write-Host "  [✗] certificates/ — MISSING" -ForegroundColor Red
            $hasErrors = $true
          }

          # Check for actual certificate (not just placeholder)
          $cerFile = Join-Path $certDir "POPSManager.cer"
          if (Test-Path $cerFile) {
            Write-Host "  [✓] POPSManager.cer found" -ForegroundColor Green

            # Validate certificate
            try {
              $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($cerFile)
              Write-Host "      Subject    : $($cert.Subject)" -ForegroundColor Gray
              Write-Host "      Thumbprint : $($cert.Thumbprint)" -ForegroundColor Gray
              Write-Host "      Expires    : $($cert.NotAfter.ToString('yyyy-MM-dd'))" -ForegroundColor Gray

              if ($cert.NotAfter -lt (Get-Date)) {
                Write-Host "  [!] Certificate is EXPIRED" -ForegroundColor Yellow
              }
            }
            catch {
              Write-Host "  [!] Could not parse certificate: $_" -ForegroundColor Yellow
            }
          }
          else {
            Write-Host "  [!] POPSManager.cer not found — placeholder only" -ForegroundColor Yellow
            Write-Host "      Release will proceed, but users must add their own cert." -ForegroundColor Gray
          }

          if ($hasErrors) {
            Write-Error "Package validation failed — missing required files."
            exit 1
          }

          Write-Host ""
          Write-Host "  Package structure validated successfully!" -ForegroundColor Green

      - name: "🧹 Lint PowerShell scripts"
        shell: pwsh
        run: |
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "  Linting PowerShell scripts"           -ForegroundColor Cyan
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan

          # Install PSScriptAnalyzer if not present
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Write-Host "  Installing PSScriptAnalyzer..." -ForegroundColor Gray
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          }

          $basePath   = "${{ env.PACKAGE_DIR }}"
          $scripts    = Get-ChildItem -Path $basePath -Filter "*.ps1" -Recurse
          $hasErrors  = $false
          $totalIssues = 0

          foreach ($script in $scripts) {
            Write-Host ""
            Write-Host "  Analyzing: $($script.Name)" -ForegroundColor White

            $results = Invoke-ScriptAnalyzer -Path $script.FullName -Severity @("Error", "Warning")

            if ($results.Count -eq 0) {
              Write-Host "    [✓] No issues found" -ForegroundColor Green
            }
            else {
              foreach ($result in $results) {
                $icon = if ($result.Severity -eq "Error") { "✗" } else { "!" }
                $color = if ($result.Severity -eq "Error") { "Red" } else { "Yellow" }

                Write-Host "    [$icon] Line $($result.Line): $($result.Message)" -ForegroundColor $color
                Write-Host "        Rule: $($result.RuleName)" -ForegroundColor Gray

                if ($result.Severity -eq "Error") { $hasErrors = $true }
                $totalIssues++
              }
            }
          }

          Write-Host ""
          Write-Host "  Total issues: $totalIssues" -ForegroundColor $(if ($totalIssues -eq 0) { "Green" } else { "Yellow" })

          if ($hasErrors) {
            Write-Error "PSScriptAnalyzer found critical errors."
            exit 1
          }

      - name: "✅ Validate script syntax"
        shell: pwsh
        run: |
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "  Validating script syntax"             -ForegroundColor Cyan
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan

          $basePath  = "${{ env.PACKAGE_DIR }}"
          $scripts   = Get-ChildItem -Path $basePath -Filter "*.ps1" -Recurse
          $hasErrors = $false

          foreach ($script in $scripts) {
            try {
              $null = [System.Management.Automation.PSParser]::Tokenize(
                (Get-Content $script.FullName -Raw), [ref]$null
              )
              Write-Host "  [✓] $($script.Name) — syntax OK" -ForegroundColor Green
            }
            catch {
              Write-Host "  [✗] $($script.Name) — syntax ERROR: $_" -ForegroundColor Red
              $hasErrors = $true
            }
          }

          if ($hasErrors) {
            Write-Error "Script syntax validation failed."
            exit 1
          }

  # ════════════════════════════════════════════════════════════
  # Job 2: Package
  # ════════════════════════════════════════════════════════════
  package:
    name: "📦 Create Package"
    runs-on: windows-latest
    needs: validate

    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
      zip_name: ${{ steps.resolve-version.outputs.zip_name }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🏷️ Resolve version"
        id: resolve-version
        shell: pwsh
        run: |
          # Determine version from tag or manual input
          $version = ""

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            Write-Host "  Version from manual input: $version" -ForegroundColor Cyan
          }
          else {
            # Extract from tag: cert-installer-v1.0.0 → 1.0.0
            $tag     = "${{ github.ref_name }}"
            $version = $tag -replace "^cert-installer-v", ""
            Write-Host "  Version from tag: $version (tag: $tag)" -ForegroundColor Cyan
          }

          # Validate semver format
          if ($version -notmatch "^\d+\.\d+\.\d+(-[\w.]+)?$") {
            Write-Error "Invalid version format: '$version'. Expected semver (e.g. 1.0.0 or 1.0.0-beta.1)"
            exit 1
          }

          $zipName = "${{ env.PACKAGE_NAME }}_v${version}.zip"

          Write-Host "  Version  : $version" -ForegroundColor Green
          Write-Host "  ZIP Name : $zipName" -ForegroundColor Green

          "version=$version"  >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: "📦 Create ZIP package"
        shell: pwsh
        run: |
          $version  = "${{ steps.resolve-version.outputs.version }}"
          $zipName  = "${{ steps.resolve-version.outputs.zip_name }}"
          $basePath = "${{ env.PACKAGE_DIR }}"
          $stagingDir = "staging/${{ env.PACKAGE_NAME }}"

          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "  Creating release package v$version"   -ForegroundColor Cyan
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan

          # Create clean staging directory
          if (Test-Path "staging") { Remove-Item -Recurse -Force "staging" }
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # Copy package files (exclude dev/temp files)
          $excludePatterns = @("*.placeholder", "*.log", "logs", ".git*")

          $items = Get-ChildItem -Path $basePath -Force | Where-Object {
            $name = $_.Name
            $excluded = $false
            foreach ($pattern in $excludePatterns) {
              if ($name -like $pattern) { $excluded = $true; break }
            }
            -not $excluded
          }

          foreach ($item in $items) {
            $dest = Join-Path $stagingDir $item.Name
            if ($item.PSIsContainer) {
              Copy-Item -Path $item.FullName -Destination $dest -Recurse -Force
            }
            else {
              Copy-Item -Path $item.FullName -Destination $dest -Force
            }
            Write-Host "  [+] $($item.Name)" -ForegroundColor Gray
          }

          # Ensure certificates directory exists
          $certDir = Join-Path $stagingDir "certificates"
          if (-not (Test-Path $certDir)) {
            New-Item -ItemType Directory -Path $certDir -Force | Out-Null
          }

          # Show final structure
          Write-Host ""
          Write-Host "  Package contents:" -ForegroundColor White
          Get-ChildItem -Path $stagingDir -Recurse -Force | ForEach-Object {
            $relative = $_.FullName.Replace((Resolve-Path $stagingDir).Path, "").TrimStart("\")
            $icon     = if ($_.PSIsContainer) { "📁" } else { "📄" }
            $size     = if (-not $_.PSIsContainer) { " ($([math]::Round($_.Length/1KB, 1)) KB)" } else { "" }
            Write-Host "    $icon $relative$size" -ForegroundColor Gray
          }

          # Create ZIP
          Write-Host ""
          Write-Host "  Creating ZIP: $zipName" -ForegroundColor Cyan

          Compress-Archive -Path "staging/*" -DestinationPath $zipName -Force

          $zipSize = [math]::Round((Get-Item $zipName).Length / 1KB, 1)
          Write-Host "  [✓] Package created: $zipName ($zipSize KB)" -ForegroundColor Green

      - name: "🔏 Generate checksums"
        shell: pwsh
        run: |
          $zipName = "${{ steps.resolve-version.outputs.zip_name }}"

          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "  Generating checksums"                 -ForegroundColor Cyan
          Write-Host "═══════════════════════════════════════" -ForegroundColor Cyan

          # SHA-256
          $sha256 = (Get-FileHash -Path $zipName -Algorithm SHA256).Hash
          "$sha256  $zipName" | Out-File -FilePath "SHA256SUMS.txt" -Encoding UTF8

          Write-Host "  SHA-256 : $sha256" -ForegroundColor Green

          # MD5 (for compatibility)
          $md5 = (Get-FileHash -Path $zipName -Algorithm MD5).Hash
          "$md5  $zipName" | Out-File -FilePath "MD5SUMS.txt" -Encoding UTF8

          Write-Host "  MD5     : $md5" -ForegroundColor Green

      - name: "📤 Upload package artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ steps.resolve-version.outputs.zip_name }}
            SHA256SUMS.txt
            MD5SUMS.txt
          retention-days: 30
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════
  # Job 3: Release
  # ════════════════════════════════════════════════════════════
  release:
    name: "🚀 Publish Release"
    runs-on: ubuntu-latest
    needs: package
    if: ${{ !(inputs.dry_run == true) }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📥 Download package artifact"
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release-assets

      - name: "📋 Extract changelog for this version"
        id: changelog
        shell: bash
        run: |
          VERSION="${{ needs.package.outputs.version }}"
          CHANGELOG_FILE="${{ env.PACKAGE_DIR }}/CHANGELOG.md"

          echo "═══════════════════════════════════════"
          echo "  Extracting changelog for v$VERSION"
          echo "═══════════════════════════════════════"

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "  [!] CHANGELOG.md not found, using default notes."
            NOTES="Release of ${{ env.PACKAGE_NAME }} v$VERSION"
          else
            # Extract section between this version and the next version header
            NOTES=$(awk -v ver="## \\[$VERSION\\]" '
              $0 ~ ver { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' "$CHANGELOG_FILE")

            if [ -z "$NOTES" ]; then
              NOTES="Release of ${{ env.PACKAGE_NAME }} v$VERSION — see CHANGELOG.md for details."
            fi
          fi

          # Write to file for multiline support
          echo "$NOTES" > release-notes.md

          echo "  Changelog extracted successfully."
          cat release-notes.md

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "cert-installer-v${{ needs.package.outputs.version }}"
          name: "📦 Certificate Installer v${{ needs.package.outputs.version }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ inputs.prerelease == true }}
          files: |
            release-assets/${{ needs.package.outputs.zip_name }}
            release-assets/SHA256SUMS.txt
            release-assets/MD5SUMS.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "✅ Release summary"
        shell: bash
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "  🎉 Release published successfully!"
          echo "═══════════════════════════════════════════════════════"
          echo ""
          echo "  Package  : ${{ env.PACKAGE_NAME }}"
          echo "  Version  : v${{ needs.package.outputs.version }}"
          echo "  ZIP      : ${{ needs.package.outputs.zip_name }}"
          echo "  Tag      : cert-installer-v${{ needs.package.outputs.version }}"
          echo ""
          echo "  Release URL:"
          echo "  ${{ github.server_url }}/${{ github.repository }}/releases/tag/cert-installer-v${{ needs.package.outputs.version }}"
          echo ""
