name: Build, Sign and Release MSIX

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # 1. Generar número de versión automático
    # -----------------------------
    - name: Generate version
      id: version
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $run = "${{ github.run_number }}"
        $version = "$date.$run"
        Write-Host "Version: $version"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    # -----------------------------
    # 2. Reconstruir el PFX desde Base64
    # -----------------------------
    - name: Restore PFX certificate
      shell: pwsh
      run: |
        $pfxBase64 = "${{ secrets.PFX_BASE64 }}"
        if ([string]::IsNullOrWhiteSpace($pfxBase64)) {
          Write-Error "❌ ERROR: El secreto PFX_BASE64 está vacío."
          exit 1
        }
        $bytes = [Convert]::FromBase64String($pfxBase64)
        [IO.File]::WriteAllBytes("cert.pfx", $bytes)
        Write-Host "✔ PFX restaurado correctamente."

    # -----------------------------
    # 3. Importar el certificado
    # -----------------------------
    - name: Import PFX certificate
      shell: pwsh
      run: |
        $password = "${{ secrets.PFX_PASSWORD }}"
        if ([string]::IsNullOrWhiteSpace($password)) {
          Write-Error "❌ ERROR: El secreto PFX_PASSWORD está vacío."
          exit 1
        }

        $secure = ConvertTo-SecureString -String $password -AsPlainText -Force

        Import-PfxCertificate `
          -FilePath cert.pfx `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password $secure `
          -Exportable | Out-Null

        Write-Host "✔ Certificado importado correctamente."

    # -----------------------------
    # 4. Build del proyecto
    # -----------------------------
    - name: Build Project
      run: |
        dotnet restore
        dotnet publish -c Release -o build_output `
          /p:Version=${{ steps.version.outputs.version }}

    # -----------------------------
    # 5. Firmar el MSIX
    # -----------------------------
    - name: Sign MSIX package
      shell: pwsh
      run: |
        $msix = Get-ChildItem -Path build_output -Filter *.msix -Recurse | Select-Object -First 1
        if (-not $msix) {
          Write-Error "❌ No se encontró ningún archivo MSIX para firmar."
          exit 1
        }

        $password = "${{ secrets.PFX_PASSWORD }}"
        $secure = ConvertTo-SecureString -String $password -AsPlainText -Force

        $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.HasPrivateKey } | Select-Object -First 1
        if (-not $cert) {
          Write-Error "❌ No se encontró el certificado importado."
          exit 1
        }

        signtool sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p $password `
          "$($msix.FullName)"

        Write-Host "✔ MSIX firmado correctamente: $($msix.Name)"

    # -----------------------------
    # 6. Publicar artefacto
    # -----------------------------
    - name: Upload signed MSIX
      uses: actions/upload-artifact@v4
      with:
        name: Signed-MSIX
        path: build_output/*.msix

    # -----------------------------
    # 7. Crear Release en GitHub
    # -----------------------------
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -----------------------------
    # 8. Subir MSIX firmado al Release
    # -----------------------------
    - name: Upload MSIX to Release
      uses: softprops/action-gh-release@v2
      with:
        files: build_output/*.msix
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
