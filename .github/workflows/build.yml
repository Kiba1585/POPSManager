name: Build, Pack and Release MSIX + Portable + Installer

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean workspace
        run: git clean -xfd

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      # ================================
      #   RESTAURAR CERTIFICADO (.PFX)
      # ================================
      - name: Restore code signing certificate
        shell: pwsh
        run: |
          $pfxBase64 = "${{ secrets.PFX_FILE }}"
          $pfxBytes = [Convert]::FromBase64String($pfxBase64)
          [IO.File]::WriteAllBytes("codesign.pfx", $pfxBytes)

      # ================================
      #   BUILD 1: MSIX x64
      # ================================
      - name: Publish project (MSIX compatible)
        run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=false -o publish

      - name: Prepare MSIX folder structure
        run: |
          New-Item -ItemType Directory -Force -Path "msix\VFS\ProgramFilesX64\POPSManager" | Out-Null
          New-Item -ItemType Directory -Force -Path "msix\Assets" | Out-Null

          Copy-Item publish\* msix\VFS\ProgramFilesX64\POPSManager\ -Recurse -Force
          Copy-Item Installer\AppxManifest.xml msix\ -Force
          Copy-Item Installer\Assets\* msix\Assets\ -Recurse -Force

      - name: Locate MakeAppx.exe (x64 only)
        id: makeappx
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter makeappx.exe |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1

          echo "MAKEAPPX=$($makeappx.FullName)" >> $env:GITHUB_ENV

      - name: Create MSIX package
        run: |
          & "$env:MAKEAPPX" pack /d msix /p "POPSManager_${{ github.ref_name }}.msix" /l

      # ================================
      #   BUILD 2: PORTABLE EXE
      # ================================
      - name: Publish portable EXE
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o portable

      - name: Create clean portable ZIP
        run: |
          mkdir PortableClean
          Copy-Item portable\* PortableClean\ -Recurse -Force -Exclude *.pdb
          Compress-Archive -Path PortableClean\* -DestinationPath POPSManager_Portable.zip

      # ================================
      #   BUILD 3: INSTALLER EXE
      # ================================
      - name: Publish installer build (non-single-file)
        run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=false -o installer_build

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Ensure installer output folder exists
        run: mkdir Installer/dist

      - name: Build Installer EXE
        run: iscc Installer\POPSManager.iss

      # ================================
      #   SIGNTOOL: LOCALIZAR Y FIRMAR
      # ================================
      - name: Locate signtool.exe
        id: signtool
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1

          echo "SIGNTOOL=$($signtool.FullName)" >> $env:GITHUB_ENV

      - name: Sign MSIX, Installer and Portable EXE
        shell: pwsh
        run: |
          $signtool = "$env:SIGNTOOL"
          $pfxPath = "codesign.pfx"
          $pfxPass = "${{ secrets.PFX_PASSWORD }}"
          $timestamp = "http://timestamp.digicert.com"

          # MSIX
          & $signtool sign /f $pfxPath /p $pfxPass /fd SHA256 /tr $timestamp /td SHA256 "POPSManager_${{ github.ref_name }}.msix"

          # Installer EXE
          & $signtool sign /f $pfxPath /p $pfxPass /fd SHA256 /tr $timestamp /td SHA256 "Installer/dist/POPSManager_Setup.exe"

          # Portable EXE principal
          $portableExe = Get-ChildItem portable -Filter "*.exe" | Select-Object -First 1
          if ($portableExe) {
            & $signtool sign /f $pfxPath /p $pfxPass /fd SHA256 /tr $timestamp /td SHA256 $portableExe.FullName
          }

      # ================================
      #   UPLOAD ARTIFACTS
      # ================================
      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager_MSIX
          path: "POPSManager_${{ github.ref_name }}.msix"

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager_Portable
          path: POPSManager_Portable.zip

      - name: Upload Installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager_Installer
          path: Installer/dist

  release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            POPSManager_MSIX/*
            POPSManager_Portable/*
            POPSManager_Installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
