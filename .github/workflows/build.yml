name: Build POPSManager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./POPSManager/POPSManager.csproj

      - name: Publish self-contained EXE
        run: dotnet publish ./POPSManager/POPSManager.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeAllContentForSelfExtract=true -p:UseWPF=true=true -p:UseWPF=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager-EXE
          path: |
            **/bin/Release/net8.0-windows/win-x64/publish/*
