name: Build, Pack and Release MSIX

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # 1. Limpiar workspace
    # -----------------------------
    - name: Clean workspace
      run: git clean -xfd

    # -----------------------------
    # 2. Generar número de versión automático
    # -----------------------------
    - name: Generate version
      id: version
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $run = "${{ github.run_number }}"
        $version = "$date.$run"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    # -----------------------------
    # 3. Publicar la app (x64 puro)
    # -----------------------------
    - name: Publish application
      shell: pwsh
      run: |
        dotnet publish POPSManager.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PlatformTarget=x64 `
          -p:PublishReadyToRun=false `
          -o publish

    # -----------------------------
    # 4. Validar arquitectura de DLLs (sin módulos externos)
    # -----------------------------
    - name: Validate DLL architecture
      shell: pwsh
      run: |
        Write-Host "🔍 Validando arquitectura de DLLs..."

        function Get-DllArchitecture {
            param([string]$Path)

            $fs = [System.IO.File]::OpenRead($Path)
            $br = New-Object System.IO.BinaryReader($fs)

            $fs.Seek(0x3C, 'Begin') | Out-Null
            $peOffset = $br.ReadInt32()

            $fs.Seek($peOffset + 4, 'Begin') | Out-Null
            $machine = $br.ReadUInt16()

            $br.Close()
            $fs.Close()

            return $machine
        }

        $invalid = @()

        Get-ChildItem publish\*.dll | ForEach-Object {
            $arch = Get-DllArchitecture $_.FullName

            switch ($arch) {
                0x8664 { Write-Host "✔ x64: $($_.Name)" }
                0x014C { Write-Host "⚠ x86 permitido: $($_.Name)" }
                0xAA64 { $invalid += $_; Write-Host "❌ ARM64: $($_.Name)" }
                0xA641 { $invalid += $_; Write-Host "❌ ARM64EC: $($_.Name)" }
                default { Write-Host "❓ Desconocido ($arch): $($_.Name)" }
            }
        }

        if ($invalid.Count -gt 0) {
            Write-Error "❌ Se encontraron DLLs ARM64. No se puede continuar."
            exit 1
        }

    # -----------------------------
    # 5. Crear estructura MSIX válida (VFS)
    # -----------------------------
    - name: Prepare MSIX structure
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path msix\VFS\ProgramFilesX64\POPSManager | Out-Null
        New-Item -ItemType Directory -Force -Path msix\Assets | Out-Null

        Copy-Item publish\* msix\VFS\ProgramFilesX64\POPSManager\ -Recurse -Force
        Copy-Item Installer\AppxManifest.xml msix\
        Copy-Item Installer\Assets\* msix\Assets\ -Recurse -Force

    # -----------------------------
    # 6. Crear MSIX con MakeAppx
    # -----------------------------
    - name: Create MSIX package
      shell: pwsh
      run: |
        Write-Host "🔍 Buscando MakeAppx.exe..."

        $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter makeappx.exe |
                    Where-Object { $_.FullName -like "*x64*" } |
                    Select-Object -First 1

        if (-not $makeappx) {
          Write-Error "❌ No se encontró MakeAppx.exe."
          exit 1
        }

        Write-Host "✔ MakeAppx encontrado en: $($makeappx.FullName)"

        & $makeappx.FullName pack `
          /d msix `
          /p POPSManager_${{ steps.version.outputs.version }}.msix `
          /l

    # -----------------------------
    # 7. Restaurar certificado PFX
    # -----------------------------
    - name: Restore PFX certificate
      shell: pwsh
      run: |
        $bytes = [Convert]::FromBase64String("${{ secrets.PFX_FILE }}")
        [IO.File]::WriteAllBytes("cert.pfx", $bytes)

    # -----------------------------
    # 8. Firmar MSIX con SignTool
    # -----------------------------
    - name: Sign MSIX package
      shell: pwsh
      run: |
        Write-Host "🔍 Buscando SignTool.exe..."

        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter signtool.exe |
                     Where-Object { $_.FullName -like "*x64*" } |
                     Select-Object -First 1

        if (-not $signtool) {
          Write-Error "❌ No se encontró SignTool.exe."
          exit 1
        }

        Write-Host "✔ SignTool encontrado en: $($signtool.FullName)"

        & $signtool.FullName sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p "${{ secrets.PFX_PASSWORD }}" `
          POPSManager_${{ steps.version.outputs.version }}.msix

    # -----------------------------
    # 9. Subir artefacto
    # -----------------------------
    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-MSIX
        path: POPSManager_*.msix

    # -----------------------------
    # 10. Crear Release (con token correcto)
    # -----------------------------
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        token: ${{ secrets.GITHUB_TOKEN }}

    # -----------------------------
    # 11. Subir MSIX al Release
    # -----------------------------
    - name: Upload MSIX to Release
      uses: softprops/action-gh-release@v2
      with:
        files: POPSManager_*.msix
        token: ${{ secrets.GITHUB_TOKEN }}
