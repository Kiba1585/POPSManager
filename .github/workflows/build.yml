name: Build and Release POPSManager

# ============================================
# CONCURRENCY: Cancela builds redundantes
# ============================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'POPSManager/POPSManager.csproj'

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ============================
      # CHECKOUT (historial completo)
      # ============================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================
      # SETUP .NET
      # ============================
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ============================
      # CACHÉ NUGET
      # ============================
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # ============================
      # RESTORE
      # ============================
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # ============================
      # VERIFY FORMAT
      # ============================
      - name: Verify code formatting
        run: dotnet format ${{ env.PROJECT_PATH }} --verify-no-changes
        continue-on-error: true

      # ============================
      # BUILD
      # ============================
      - name: Build
        run: >
          dotnet build ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-restore
          -p:ContinuousIntegrationBuild=true

      # ============================
      # PUBLISH PORTABLE
      # ============================
      - name: Publish Portable
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --output ./publish/portable
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          -p:ContinuousIntegrationBuild=true

      # ============================
      # PUBLISH SELF-CONTAINED
      # ============================
      - name: Publish Self-Contained
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --output ./publish/self-contained
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:ContinuousIntegrationBuild=true

      # ============================
      # COMPRESS ARTIFACTS
      # ============================
      - name: Compress Portable
        run: Compress-Archive -Path ./publish/portable/* -DestinationPath ./POPSManager-Portable.zip

      - name: Compress Self-Contained
        run: Compress-Archive -Path ./publish/self-contained/* -DestinationPath ./POPSManager-SelfContained.zip

      # ============================
      # SHA256 CHECKSUMS
      # ============================
      - name: Generate SHA256 checksums
        run: |
          $portable = Get-FileHash ./POPSManager-Portable.zip -Algorithm SHA256
          $selfcontained = Get-FileHash ./POPSManager-SelfContained.zip -Algorithm SHA256
          @(
            "## SHA256 Checksums",
            "",
            "| File | SHA256 |",
            "| --- | --- |",
            "| POPSManager-Portable.zip | $($portable.Hash) |",
            "| POPSManager-SelfContained.zip | $($selfcontained.Hash) |"
          ) | Out-File -FilePath ./CHECKSUMS.md -Encoding utf8

      # ============================
      # UPLOAD ARTIFACTS
      # ============================
      - name: Upload Portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager-Portable
          path: ./POPSManager-Portable.zip

      - name: Upload Self-Contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager-SelfContained
          path: ./POPSManager-SelfContained.zip

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: CHECKSUMS
          path: ./CHECKSUMS.md

  # ============================
  # RELEASE JOB
  # ============================
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Portable
        uses: actions/download-artifact@v4
        with:
          name: POPSManager-Portable

      - name: Download Self-Contained
        uses: actions/download-artifact@v4
        with:
          name: POPSManager-SelfContained

      - name: Download Checksums
        uses: actions/download-artifact@v4
        with:
          name: CHECKSUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: POPSManager v${{ github.run_number }}
          generate_release_notes: true
          files: |
            POPSManager-Portable.zip
            POPSManager-SelfContained.zip
            CHECKSUMS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
