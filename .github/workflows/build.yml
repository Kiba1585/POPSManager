name: Build, Sign and Release MSIX

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # 1. Generar número de versión automático
    # -----------------------------
    - name: Generate version
      id: version
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $run = "${{ github.run_number }}"
        $version = "$date.$run"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    # -----------------------------
    # 2. Restaurar paquetes NuGet con RID win-x86
    # -----------------------------
    - name: Restore NuGet packages
      shell: pwsh
      run: |
        Write-Host "📦 Restaurando paquetes NuGet..."
        dotnet restore POPSManager.csproj -r win-x86

    # -----------------------------
    # 3. Reconstruir el PFX desde Base64
    # -----------------------------
    - name: Restore PFX certificate
      shell: pwsh
      run: |
        $bytes = [Convert]::FromBase64String("${{ secrets.PFX_FILE }}")
        [IO.File]::WriteAllBytes("cert.pfx", $bytes)
        Write-Host "✔ Certificado PFX restaurado."

    # -----------------------------
    # 4. Importar el certificado
    # -----------------------------
    - name: Import PFX certificate
      shell: pwsh
      run: |
        $secure = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force
        Import-PfxCertificate -FilePath cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $secure -Exportable | Out-Null
        Write-Host "✔ Certificado importado."

    # -----------------------------
    # 5. Compilar el proyecto MSIX (.wapproj)
    # -----------------------------
    - name: Build MSIX Package
      shell: pwsh
      run: |
        Write-Host "🔍 Buscando MSBuild.exe..."
        $msbuild = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022" -Recurse -Filter MSBuild.exe | Select-Object -First 1

        Write-Host "✔ MSBuild encontrado en: $($msbuild.FullName)"

        & "$($msbuild.FullName)" POPSManager.Package/POPSManager.Package.wapproj `
          /p:Configuration=Release `
          /p:AppxBundle=Always `
          /p:AppxBundlePlatforms=x64 `
          /p:UapAppxPackageBuildMode=StoreUpload `
          /p:RuntimeIdentifier=win-x86 `
          /p:Version=${{ steps.version.outputs.version }}

    # -----------------------------
    # 6. Firmar el MSIX / MSIXBUNDLE
    # -----------------------------
    - name: Sign MSIX package
      shell: pwsh
      run: |
        $msix = Get-ChildItem -Path "POPSManager.Package/bin/Release" -Filter *.msix* -Recurse | Select-Object -First 1
        if (-not $msix) {
          Write-Error "❌ No se encontró ningún archivo MSIX/MSIXBUNDLE para firmar."
          exit 1
        }

        signtool sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p "${{ secrets.PFX_PASSWORD }}" `
          "$($msix.FullName)"

        Write-Host "✔ MSIX firmado: $($msix.Name)"

    # -----------------------------
    # 7. Subir artefacto
    # -----------------------------
    - name: Upload signed MSIX
      uses: actions/upload-artifact@v4
      with:
        name: Signed-MSIX
        path: POPSManager.Package/bin/Release/**/*.msix*

    # -----------------------------
    # 8. Crear Release en GitHub
    # -----------------------------
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -----------------------------
    # 9. Subir MSIX firmado al Release
    # -----------------------------
    - name: Upload MSIX to Release
      uses: softprops/action-gh-release@v2
      with:
        files: POPSManager.Package/bin/Release/**/*.msix*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
