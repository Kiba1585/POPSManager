name: Build, Pack and Release MSIX

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish project
        run: dotnet publish -c Release -r win-x64 --self-contained false -o publish

      - name: Prepare MSIX folder structure
        run: |
          # Crear carpetas necesarias
          New-Item -ItemType Directory -Force -Path "msix\VFS\ProgramFiles\POPSManager" | Out-Null
          New-Item -ItemType Directory -Force -Path "msix\Assets" | Out-Null

          # Copiar archivos publicados
          Copy-Item publish\* msix\VFS\ProgramFiles\POPSManager\ -Recurse -Force

          # Copiar manifest corregido
          Copy-Item Installer\AppxManifest.xml msix\ -Force

          # Copiar íconos desde Installer/Assets
          Copy-Item Installer\Assets\* msix\Assets\ -Recurse -Force

      - name: Locate MakeAppx.exe
        id: makeappx
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter makeappx.exe | Select-Object -First 1
          echo "MAKEAPPX=$($makeappx.FullName)" >> $env:GITHUB_ENV

      - name: Create MSIX package
        run: |
          & "$env:MAKEAPPX" pack /d msix /p "POPSManager_${{ github.ref_name }}.msix" /l

      - name: Locate SignTool.exe
        id: signtool
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter signtool.exe | Select-Object -First 1
          echo "SIGNTOOL=$($signtool.FullName)" >> $env:GITHUB_ENV

      - name: Sign MSIX package
        run: |
          $password = ConvertTo-SecureString "${{ secrets.CERT_PASSWORD }}" -AsPlainText -Force
          $certPath = "$env:RUNNER_TEMP\cert.pfx"
          Set-Content -Path $certPath -Value ([System.Convert]::FromBase64String("${{ secrets.CERT_PFX }}")) -Encoding Byte
          & "$env:SIGNTOOL" sign /a /f $certPath /p $password "POPSManager_${{ github.ref_name }}.msix"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager_MSIX
          path: "POPSManager_${{ github.ref_name }}.msix"

  release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: POPSManager_MSIX

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "POPSManager_${{ github.ref_name }}.msix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
