name: Build and Release POPSManager

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'POPSManager.csproj'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish Portable
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output publish/portable --runtime win-x64 --self-contained false

      - name: Publish Self-Contained
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output publish/self-contained --runtime win-x64 --self-contained true -p:PublishSingleFile=true

      # ============================
      # ARTIFACTS
      # ============================
      - name: Create artifacts folder
        run: mkdir artifacts

      # ============================
      # INNO SETUP (FIX REAL)
      # ============================
      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Verify Inno Setup
        run: |
          if (!(Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            Write-Error "ISCC.exe not found"
            exit 1
          }

      - name: Build Installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Installer/POPSManager.iss" /O"artifacts" /F"POPSManager-Installer"

      # ============================
      # MSIX (FIX DINÁMICO)
      # ============================
      - name: Locate MakeAppx
        id: makeappx
        run: |
          $path = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter MakeAppx.exe | 
                  Sort-Object FullName -Descending | 
                  Select-Object -First 1

          if ($path -eq $null) {
            Write-Error "MakeAppx.exe not found"
            exit 1
          }

          echo "MAKEAPPX=$($path.FullName)" >> $env:GITHUB_ENV

      - name: Create MSIX
        run: |
          & "$env:MAKEAPPX" pack /d publish/self-contained /p artifacts/POPSManager.msix

      # ============================
      # ZIPS
      # ============================
      - name: Create Portable ZIP
        run: Compress-Archive -Path publish/portable/* -DestinationPath artifacts/POPSManager-Portable.zip

      - name: Create SelfContained ZIP
        run: Compress-Archive -Path publish/self-contained/* -DestinationPath artifacts/POPSManager-SelfContained.zip

      # ============================
      # UPLOAD
      # ============================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "POPSManager v${{ github.run_number }}"
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}