name: Build, Pack and Release MSIX

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Limpieza total del workspace (evita errores WPF y archivos viejos)
      - name: Clean workspace
        run: git clean -xfd

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      # ================================
      #   PUBLICACIÓN SELF-CONTAINED
      # ================================
      - name: Publish project (self-contained)
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o publish

      - name: Prepare MSIX folder structure
        run: |
          New-Item -ItemType Directory -Force -Path "msix\VFS\ProgramFiles\POPSManager" | Out-Null
          New-Item -ItemType Directory -Force -Path "msix\Assets" | Out-Null

          Copy-Item publish\* msix\VFS\ProgramFiles\POPSManager\ -Recurse -Force
          Copy-Item Installer\AppxManifest.xml msix\ -Force
          Copy-Item Installer\Assets\* msix\Assets\ -Recurse -Force

      # ================================
      #   MAKEAPPX (solo versión x64)
      # ================================
      - name: Locate MakeAppx.exe (x64 only)
        id: makeappx
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter makeappx.exe |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1

          if (-not $makeappx) {
            Write-Error "No se encontró MakeAppx.exe x64"
          }

          echo "MAKEAPPX=$($makeappx.FullName)" >> $env:GITHUB_ENV

      - name: Create MSIX package
        run: |
          & "$env:MAKEAPPX" pack /d msix /p "POPSManager_${{ github.ref_name }}.msix" /l

      # ================================
      #   SIGNTOOL (solo versión x64)
      # ================================
      - name: Locate SignTool.exe (x64 only)
        id: signtool
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1

          if (-not $signtool) {
            Write-Error "No se encontró SignTool.exe x64"
          }

          echo "SIGNTOOL=$($signtool.FullName)" >> $env:GITHUB_ENV

      - name: Sign MSIX package
        run: |
          $certPath = "$env:RUNNER_TEMP\cert.pfx"

          # Guardar el PFX correctamente como archivo binario
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.PFX_FILE }}"))

          # Firmar el MSIX con SHA256 (obligatorio)
          & "$env:SIGNTOOL" sign `
            /fd SHA256 `
            /a `
            /f $certPath `
            /p "${{ secrets.PFX_PASSWORD }}" `
            "POPSManager_${{ github.ref_name }}.msix"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: POPSManager_MSIX
          path: "POPSManager_${{ github.ref_name }}.msix"

  release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: POPSManager_MSIX

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "POPSManager_${{ github.ref_name }}.msix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
