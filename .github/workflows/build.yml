name: Build, Pack and Release MSIX

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # 1. Generar número de versión automático
    # -----------------------------
    - name: Generate version
      id: version
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $run = "${{ github.run_number }}"
        $version = "$date.$run"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    # -----------------------------
    # 2. Publicar la app (Win32/WPF)
    # -----------------------------
    - name: Publish application
      shell: pwsh
      run: |
        dotnet publish POPSManager.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -o publish

    # -----------------------------
    # 3. Preparar carpeta MSIX
    # -----------------------------
    - name: Prepare MSIX folder
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path msix | Out-Null
        Copy-Item -Path publish\* -Destination msix -Recurse -Force
        Copy-Item -Path Installer\AppxManifest.xml -Destination msix -Force
        Copy-Item -Path Installer\Assets -Destination msix\Assets -Recurse -Force

    # -----------------------------
    # 4. Crear el archivo .msix (MakeAppx dinámico)
    # -----------------------------
    - name: Create MSIX package
      shell: pwsh
      run: |
        Write-Host "🔍 Buscando MakeAppx.exe..."

        $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter makeappx.exe -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -like "*x64*" } |
                    Select-Object -First 1

        if (-not $makeappx) {
          Write-Error "❌ No se encontró MakeAppx.exe en el runner."
          exit 1
        }

        Write-Host "✔ MakeAppx encontrado en: $($makeappx.FullName)"

        & $makeappx.FullName pack `
          /d msix `
          /p POPSManager_${{ steps.version.outputs.version }}.msix `
          /l

    # -----------------------------
    # 5. Restaurar certificado PFX
    # -----------------------------
    - name: Restore PFX certificate
      shell: pwsh
      run: |
        $bytes = [Convert]::FromBase64String("${{ secrets.PFX_FILE }}")
        [IO.File]::WriteAllBytes("cert.pfx", $bytes)

    # -----------------------------
    # 6. Firmar el MSIX (SignTool dinámico)
    # -----------------------------
    - name: Sign MSIX package
      shell: pwsh
      run: |
        Write-Host "🔍 Buscando SignTool.exe..."

        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -like "*x64*" } |
                     Select-Object -First 1

        if (-not $signtool) {
          Write-Error "❌ No se encontró SignTool.exe en el runner."
          exit 1
        }

        Write-Host "✔ SignTool encontrado en: $($signtool.FullName)"

        & $signtool.FullName sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p "${{ secrets.PFX_PASSWORD }}" `
          POPSManager_${{ steps.version.outputs.version }}.msix

    # -----------------------------
    # 7. Subir artefacto
    # -----------------------------
    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-MSIX
        path: POPSManager_*.msix

    # -----------------------------
    # 8. Crear Release
    # -----------------------------
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -----------------------------
    # 9. Subir MSIX al Release
    # -----------------------------
    - name: Upload MSIX to Release
      uses: softprops/action-gh-release@v2
      with:
        files: POPSManager_*.msix
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
