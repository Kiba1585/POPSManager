name: Build and Sign MSIX

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # 1. Reconstruir el PFX desde Base64
    # -----------------------------
    - name: Restore PFX certificate
      shell: pwsh
      run: |
        $pfxBase64 = "${{ secrets.PFX_BASE64 }}"
        if ([string]::IsNullOrWhiteSpace($pfxBase64)) {
          Write-Error "❌ ERROR: El secreto PFX_BASE64 está vacío."
          exit 1
        }
        $bytes = [Convert]::FromBase64String($pfxBase64)
        [IO.File]::WriteAllBytes("cert.pfx", $bytes)
        Write-Host "✔ PFX restaurado correctamente."

    # -----------------------------
    # 2. Importar el certificado
    # -----------------------------
    - name: Import PFX certificate
      shell: pwsh
      run: |
        $password = "${{ secrets.PFX_PASSWORD }}"
        if ([string]::IsNullOrWhiteSpace($password)) {
          Write-Error "❌ ERROR: El secreto PFX_PASSWORD está vacío."
          exit 1
        }

        $secure = ConvertTo-SecureString -String $password -AsPlainText -Force

        Import-PfxCertificate `
          -FilePath cert.pfx `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password $secure `
          -Exportable | Out-Null

        Write-Host "✔ Certificado importado correctamente."

    # -----------------------------
    # 3. Build del proyecto
    # -----------------------------
    - name: Build Project
      run: |
        dotnet restore
        dotnet publish -c Release -o build_output

    # -----------------------------
    # 4. Firmar el MSIX
    # -----------------------------
    - name: Sign MSIX package
      shell: pwsh
      run: |
        $msix = Get-ChildItem -Path build_output -Filter *.msix -Recurse | Select-Object -First 1
        if (-not $msix) {
          Write-Error "❌ No se encontró ningún archivo MSIX para firmar."
          exit 1
        }

        $password = "${{ secrets.PFX_PASSWORD }}"
."

    # -----------------------------
    # 3. Build del proyecto
    # -----------------------------
    - name: Build Project
      run: |
        dotnet restore
        dotnet publish -c Release -o build_output

    # -----------------------------
    # 4. Firmar el MSIX
    # -----------------------------
    - name: Sign MSIX package
      shell: pwsh
      run: |
        $msix = Get-ChildItem -Path build_output -Filter *.msix -Recurse | Select-Object -First 1
        if (-not $msix) {
          Write-Error "❌ No se encontró ningún archivo MSIX para firmar."
          exit 1
        }

        $password = "${{ secrets.PFX_PASSWORD }}"
        $secure = ConvertTo-SecureString -String $password -AsPlainText -Force

        $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.HasPrivateKey } | Select-Object -First 1
        if (-not $cert) {
          Write-Error "❌ No se encontró el certificado importado."
          exit 1
        }

        signtool sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p $password `
          "$($msix.FullName)"

        Write-Host "✔ MSIX firmado correctamente: $($msix.Name)"

    # -----------------------------
    # 5. Publicar artefacto
    # -----------------------------
    - name: Upload signed MSIX
      uses: actions/upload-artifact@v4
      with:
        name: Signed-MSIX
        path: build_output/*.msix
