name: Build POPSManager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore ./POPSManager.csproj

    - name: Publish self-contained EXE
      run: dotnet publish ./POPSManager.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeAllContentForSelfExtract=true -p:UseWPF=true

    - name: Detect publish folder
      id: find_publish
      shell: pwsh
      run: |
        $publish = Get-ChildItem -Recurse -Directory -Filter publish | Select-Object -First 1
        if (-not $publish) {
            Write-Error "❌ No se encontró carpeta publish"
            exit 1
        }
        Write-Host "Carpeta publish encontrada: $($publish.FullName)"
        echo "publish_path=$($publish.FullName)" >> $env:GITHUB_OUTPUT

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-EXE
        path: ${{ steps.find_publish.outputs.publish_path }}/*

    - name: Crear carpeta MSIX
      shell: pwsh
      run: |
        mkdir msix
        cp -r "${{ steps.find_publish.outputs.publish_path }}/*" ./msix/

        if (Test-Path "./Installer") {
            cp -r ./Installer/* ./msix/
        } else {
            Write-Host "⚠️ Carpeta Installer no encontrada, continuando sin archivos adicionales."
        }

    - name: Empaquetar MSIX
      shell: pwsh
      run: |
        $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Recurse -Filter makeappx.exe |
                    Where-Object { $_.FullName -like "*\x64\makeappx.exe" } |
                    Select-Object -First 1

        if (-not $makeappx) {
            Write-Error "❌ No se encontró MakeAppx.exe en x64"
            exit 1
        }

        Write-Host "Usando MakeAppx en: $($makeappx.FullName)"
        & $makeappx.FullName pack /d msix /p POPSManager.msix

    - name: Subir artefacto MSIX
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-MSIX
        path: POPSManager.msix
