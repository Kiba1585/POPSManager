name: Build POPSManager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Remove .NET 10 (fix WPF build)
      shell: pwsh
      run: |
        Remove-Item "C:\Program Files\dotnet\shared\Microsoft.NETCore.App\10.0.5" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item "C:\Program Files\dotnet\shared\Microsoft.WindowsDesktop.App\10.0.5" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Setup .NET 8 only
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
        include-prerelease: false
        quality: ga

    - name: Restore
      run: dotnet restore ./POPSManager.csproj

    - name: Publish self-contained EXE
      run: dotnet publish ./POPSManager.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeAllContentForSelfExtract=true -p:UseWPF=true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-EXE
        path: |
          **/bin/Release/net8.0-windows/win-x64/publish/*
