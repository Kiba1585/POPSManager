name: 🧹 Limpiar artefactos y cachés antiguos

on:
  schedule:
    - cron: '0 4 * * *'   # cada día a las 4 AM UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 🗑️ Borrar artefactos viejos (conserva los 3 últimos por nombre)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Listar todos los artefactos (paginado)
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            // Agrupar por nombre de artefacto
            const grouped = {};
            for (const art of artifacts) {
              const name = art.name;
              if (!grouped[name]) grouped[name] = [];
              grouped[name].push(art);
            }

            // Ordenar cada grupo por fecha y eliminar los más antiguos, dejando solo 3
            for (const [name, list] of Object.entries(grouped)) {
              list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const toDelete = list.slice(3);
              for (const art of toDelete) {
                console.log(`Borrando artefacto: ${art.name} (ID: ${art.id})`);
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: art.id
                });
              }
            }

      - name: 🧽 Limpiar cachés antiguos (más de 7 días sin uso)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const caches = await github.rest.actions.getActionsCacheList({
              owner, repo, per_page: 100
            });
            const cutoff = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            for (const cache of caches.data.actions_caches) {
              if (new Date(cache.last_accessed_at) < cutoff) {
                console.log(`Borrando caché: ${cache.key}`);
                await github.rest.actions.deleteActionsCacheById({
                  owner, repo, cache_id: cache.id
                });
              }
            }